<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 60" width="100%" height="60">
    <defs>
        <style>
            .main-fur { fill: #334155; stroke: #334155; stroke-linecap: round; stroke-linejoin: round; }
            .back-fur { fill: #0f172a; stroke: #0f172a; stroke-linecap: round; stroke-linejoin: round; }
            .eyes { fill: #38bdf8; }
            .eyes-closed { stroke: #0f172a; stroke-width: 1; fill: none; stroke-linecap: round; }
            .whiskers { stroke: #94a3b8; stroke-width: 0.5; stroke-linecap: round; fill: none; }
            .tongue { stroke: #f472b6; stroke-width: 1.5; stroke-linecap: round; fill: none; }
           
            .packet-core { fill: #ffffff; }
            .packet-glow { fill: #38bdf8; opacity: 0.8; filter: drop-shadow(0 0 5px #38bdf8); }
            
            .master-x-cat { animation: masterXCat 10s linear infinite; }
            .master-x-packet { animation: masterXPacket 10s linear infinite; }
           
            @keyframes masterXCat {
                0% { transform: translateX(-150px) scaleX(1); }
                20% { transform: translateX(350px) scaleX(1); }   
                64.99% { transform: translateX(350px) scaleX(1); } 
                65% { transform: translateX(350px) scaleX(-1); }   
                75% { transform: translateX(350px) scaleX(-1); }   
                100% { transform: translateX(-250px) scaleX(-1); } 
            }
            @keyframes masterXPacket {
                0% { transform: translate(-50px, 40px); }
                18% { transform: translate(450px, 40px); }   
                60% { transform: translate(450px, 40px); }   
                62% { transform: translate(450px, -5px); }   
                64% { transform: translate(250px, -5px); }   
                65% { transform: translate(250px, 40px); }   
                75% { transform: translate(250px, 40px); }   
                95% { transform: translate(-300px, 40px); }  
                100% { transform: translate(-300px, 40px); }
            }
            
            .state-run { animation: toggleRun 10s infinite; }
            .state-wonder { animation: toggleWonder 10s infinite; }
            .state-groom { animation: toggleGroom 10s infinite; }
           
            @keyframes toggleRun {
                0%, 19.99% { opacity: 1; }
                20%, 74.99% { opacity: 0; }
                75%, 100% { opacity: 1; }
            }
            @keyframes toggleWonder {
                0%, 19.99% { opacity: 0; }
                20%, 29.99% { opacity: 1; }
                30%, 64.99% { opacity: 0; }
                65%, 74.99% { opacity: 1; }
                75%, 100% { opacity: 0; }
            }
            @keyframes toggleGroom {
                0%, 29.99% { opacity: 0; }
                30%, 64.99% { opacity: 1; }
                65%, 100% { opacity: 0; }
            }
            
            .run-master { animation: runMaster 0.35s infinite linear; transform-origin: 0px 2px; }
            .run-torso { animation: runTorso 0.35s infinite linear; transform-origin: -2px 2px; }
            .run-head-grp { animation: runHead 0.35s infinite linear; transform-origin: 12px -2px; }
            .run-tail { animation: runTail 0.35s infinite linear; transform-origin: -14px 0px; }
           
            .run-f-shoulder { animation: runFShoulder 0.35s infinite linear; }
            .run-f-arm { animation: runFArm 0.35s infinite linear; }
            .run-b-thigh { animation: runBThigh 0.35s infinite linear; }
            .run-b-calf { animation: runBCalf 0.35s infinite linear; }
            .offset-anim { animation-delay: -0.05s; } 
            @keyframes runMaster {
                0% { transform: translateY(0px) rotate(-4deg); }
                25% { transform: translateY(-1px) rotate(-6deg); }
                50% { transform: translateY(-7px) rotate(4deg); } 
                75% { transform: translateY(-3px) rotate(6deg); }
                100% { transform: translateY(0px) rotate(-4deg); }
            }
            @keyframes runTorso {
                0% { transform: scaleX(1.15) scaleY(0.9); } 
                25% { transform: scaleX(1.0) scaleY(1.0); }
                50% { transform: scaleX(0.85) scaleY(1.1); } 
                75% { transform: scaleX(1.0) scaleY(1.0); }
                100% { transform: scaleX(1.15) scaleY(0.9); }
            }
            @keyframes runHead {
                0% { transform: rotate(4deg) translateY(0px); }
                25% { transform: rotate(6deg) translateY(1px); }
                50% { transform: rotate(-4deg) translateY(2px); }
                75% { transform: rotate(-6deg) translateY(0px); }
                100% { transform: rotate(4deg) translateY(0px); }
            }
            @keyframes runTail {
                0% { transform: rotate(10deg); }
                25% { transform: rotate(0deg); }
                50% { transform: rotate(-35deg); }
                75% { transform: rotate(-15deg); }
                100% { transform: rotate(10deg); }
            }
           
            @keyframes runFShoulder {
                0% { transform: rotate(-55deg); }  
                25% { transform: rotate(5deg); }   
                50% { transform: rotate(55deg); }  
                75% { transform: rotate(-10deg); } 
                100% { transform: rotate(-55deg); }
            }
            @keyframes runFArm {
                0% { transform: rotate(0deg); }    
                25% { transform: rotate(15deg); }  
                50% { transform: rotate(-40deg); } 
                75% { transform: rotate(-75deg); } 
                100% { transform: rotate(0deg); }
            }
            
            @keyframes runBThigh {
                0% { transform: rotate(65deg); }   
                25% { transform: rotate(20deg); }  
                50% { transform: rotate(-45deg); } 
                75% { transform: rotate(-15deg); } 
                100% { transform: rotate(65deg); }
            }
            @keyframes runBCalf {
                0% { transform: rotate(15deg); }   
                25% { transform: rotate(-70deg); } 
                50% { transform: rotate(-50deg); } 
                75% { transform: rotate(-15deg); } 
                100% { transform: rotate(15deg); }
            }
            
            .wonder-head { animation: wonderHead 2s infinite ease-in-out; transform-origin: 14px -5px; }
            .wonder-tail { animation: wagIdle 2s infinite ease-in-out; transform-origin: -15px 2px; }
            @keyframes wonderHead {
                0%, 100% { transform: rotate(0deg); }
                30%, 40% { transform: rotate(-20deg); } 
                60%, 70% { transform: rotate(10deg); }  
            }
            @keyframes wagIdle {
                0%, 100% { transform: rotate(-10deg); }
                50% { transform: rotate(25deg); }
            }
            
            .groom-head { animation: lickBob 0.5s infinite linear; transform-origin: 9px -6px; }
            .groom-tail { animation: tailFlick 3s infinite ease-in-out; transform-origin: -10px 12px; }
            @keyframes lickBob {
                0%, 100% { transform: rotate(0deg) translateY(0); }
                50% { transform: rotate(-8deg) translateY(2px); } 
            }
            @keyframes tailFlick {
                0%, 100% { transform: rotate(0deg); }
                50% { transform: rotate(10deg); }
            }
            
            .packet-bounce { animation: packetBob 0.6s infinite alternate ease-in-out; }
            @keyframes packetBob {
                0% { transform: translateY(-3px); }
                100% { transform: translateY(3px); }
            }
        </style>
    </defs>
    
    <g class="master-x-packet">
        <g class="packet-bounce">
            <circle cx="0" cy="0" r="4.5" class="packet-glow" />
            <circle cx="0" cy="0" r="2" class="packet-core" />
        </g>
    </g>
    
    <g class="master-x-cat">
        <g transform="translate(0, 35)">
           
            <g class="state-run">
                <g class="run-master">
                   
                    <g transform="translate(-8, 1)">
                        <g class="run-b-thigh offset-anim" style="transform-origin: 0px 0px;">
                            <line class="back-fur" x1="0" y1="0" x2="0" y2="7" stroke-width="4.5" />
                            <g class="run-b-calf offset-anim" transform="translate(0, 7)" style="transform-origin: 0px 0px;">
                                <line class="back-fur" x1="0" y1="0" x2="0" y2="7" stroke-width="4" />
                                <path class="back-fur" d="M -1 7 L 2 7" stroke-width="3" />
                            </g>
                        </g>
                    </g>
                    
                    <g transform="translate(10, 1)">
                        <g class="run-f-shoulder offset-anim" style="transform-origin: 0px 0px;">
                            <line class="back-fur" x1="0" y1="0" x2="0" y2="6" stroke-width="4.5" />
                            <g class="run-f-arm offset-anim" transform="translate(0, 6)" style="transform-origin: 0px 0px;">
                                <line class="back-fur" x1="0" y1="0" x2="0" y2="7" stroke-width="4" />
                                <path class="back-fur" d="M -1 7 L 2 7" stroke-width="3" />
                            </g>
                        </g>
                    </g>
                    
                    <path class="back-fur run-tail" d="M -14 0 Q -30 -2 -35 -5" stroke-width="3.5" fill="none" />
                    
                    <g class="run-torso">
                        <line class="main-fur" x1="-13" y1="1" x2="9" y2="1" stroke-width="12" stroke-linecap="round" />
                        <circle class="main-fur" cx="-9" cy="0" r="6.5" />
                        <circle class="main-fur" cx="6" cy="1" r="5.5" />
                    </g>
                    
                    <g transform="translate(-10, 2)">
                        <g class="run-b-thigh" style="transform-origin: 0px 0px;">
                            <line class="main-fur" x1="0" y1="0" x2="0" y2="7" stroke-width="4.5" />
                            <g class="run-b-calf" transform="translate(0, 7)" style="transform-origin: 0px 0px;">
                                <line class="main-fur" x1="0" y1="0" x2="0" y2="7" stroke-width="4" />
                                <path class="main-fur" d="M -1 7 L 2 7" stroke-width="3" />
                            </g>
                        </g>
                    </g>
                    
                    <g transform="translate(8, 2)">
                        <g class="run-f-shoulder" style="transform-origin: 0px 0px;">
                            <line class="main-fur" x1="0" y1="0" x2="0" y2="6" stroke-width="4.5" />
                            <g class="run-f-arm" transform="translate(0, 6)" style="transform-origin: 0px 0px;">
                                <line class="main-fur" x1="0" y1="0" x2="0" y2="7" stroke-width="4" />
                                <path class="main-fur" d="M -1 7 L 2 7" stroke-width="3" />
                            </g>
                        </g>
                    </g>
                    
                    <g class="run-head-grp">
                        <circle class="main-fur" cx="15" cy="-3" r="7" />
                        <polygon class="main-fur" points="11,-7 10,-15 16,-9" />
                        <polygon class="main-fur" points="15,-9 19,-14 21,-5" />
                        <path class="whiskers" d="M 19 0 L 26 -1 M 19 2 L 27 2 M 19 4 L 26 5" />
                        <circle class="eyes" cx="18" cy="-4" r="1.5" />
                        <circle class="eyes" cx="21" cy="-3" r="1.5" />
                    </g>
                </g>
            </g>
            
            <g class="state-wonder">
                
                <path class="back-fur wonder-tail" d="M -15 2 Q -25 -10 -15 -20" stroke-width="3" fill="none" />
                
                <line class="back-fur" x1="-10" y1="2" x2="-10" y2="18" stroke-width="4" />
                <line class="back-fur" x1="6" y1="2" x2="6" y2="18" stroke-width="4" />
               
                
                <line class="main-fur" x1="-12" y1="2" x2="8" y2="2" stroke-width="12" />
               
                <line class="main-fur" x1="-6" y1="2" x2="-6" y2="18" stroke-width="4" />
                <line class="main-fur" x1="10" y1="2" x2="10" y2="18" stroke-width="4" />
                
                <g class="wonder-head">
                    <circle class="main-fur" cx="14" cy="-5" r="7" />
                    <polygon class="main-fur" points="10,-9 11,-17 15,-11" />
                    <polygon class="main-fur" points="14,-11 19,-16 20,-7" />
                   
                    <path class="whiskers" d="M 18 -2 L 25 -3 M 18 0 L 26 0 M 18 2 L 25 3" />
                    <circle class="eyes" cx="17" cy="-6" r="1.5" />
                    <circle class="eyes" cx="20" cy="-5" r="1.5" />
                </g>
            </g>
            
            <g class="state-groom">
                
                <path class="back-fur groom-tail" d="M -10 12 Q -25 15 -18 2 Q -15 -5 -10 0" stroke-width="3" fill="none" />
               
                
                <circle class="back-fur" cx="-5" cy="12" r="5" />
               
                
                <line class="back-fur" x1="6" y1="6" x2="6" y2="18" stroke-width="4" />
               
                
                <line class="main-fur" x1="-5" y1="10" x2="5" y2="0" stroke-width="13" />
               
                
                <circle class="main-fur" cx="-2" cy="13" r="6" />
                <line class="main-fur" x1="-2" y1="13" x2="4" y2="18" stroke-width="4" />
               
                
                <path class="main-fur" d="M 3 2 Q 12 4 10 -4" stroke-width="4" fill="none" />
               
                
                <g class="groom-head">
                    <circle class="main-fur" cx="9" cy="-6" r="7" />
                    
                    <polygon class="main-fur" points="4,-9 3,-16 9,-12" />
                    <polygon class="main-fur" points="8,-12 11,-18 14,-10" />
                   
                    
                    <path class="eyes-closed" d="M 10 -6 Q 12 -5 14 -6 M 15 -5 Q 16 -4 17 -5" />
                   
                    
                    <path class="tongue" d="M 12 -2 L 11 0" />
                   
                    
                    <path class="whiskers" d="M 13 -2 L 20 -1 M 13 0 L 21 2 M 13 2 L 19 5" />
                </g>
            </g>
        </g>
    </g>
</svg>
