<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 220" width="100%" height="220">
    <defs>
        <style>
            .name { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; font-size: 42px; font-weight: 800; fill: #0f172a; }
            .subtitle { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; font-size: 13px; font-weight: 600; fill: #64748b; letter-spacing: 3px; }
            .tech-text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; font-size: 12px; font-weight: 500; fill: #94a3b8; opacity: 0; animation: fadeUp 1s ease-out forwards; }
            
            .line { stroke: url(#gradient); stroke-width: 3; stroke-dasharray: 400; stroke-dashoffset: 400; animation: draw 1.5s cubic-bezier(0.25, 1, 0.5, 1) forwards; animation-delay: 0.4s; stroke-linecap: round; }
            .node { fill: url(#gradient); opacity: 0; animation: popIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
            
            .link-line { stroke: #cbd5e1; stroke-width: 1.5; opacity: 0; fill: none; stroke-dasharray: 4 4; animation: fadeIn 1s ease forwards 1.2s, march 1s linear infinite; }
            
            .packet { fill: #38bdf8; opacity: 0; animation: packetFade 2.5s ease-in-out infinite; }
            
            .pulse { fill: none; stroke: #38bdf8; stroke-width: 1; opacity: 0; transform-origin: center; animation: radar 2.5s ease-out infinite; }

            .typewriter-rect { width: 0; animation: revealText 1.5s steps(40) forwards; animation-delay: 0.8s; }
            
            .name-glitch { opacity: 0; animation: fadeUp 1s ease-out forwards, glitch 0.3s cubic-bezier(.25, .46, .45, .94) both 1.4s; }

            .d-1 { animation-delay: 1.0s; }
            .d-2 { animation-delay: 1.2s; }
            .d-3 { animation-delay: 1.4s; }
            .floating { animation: float 8s ease-in-out infinite; transform-origin: center; }

            @keyframes fadeUp {
                from { opacity: 0; transform: translateY(15px); }
                to { opacity: 1; transform: translateY(0); }
            }
            @keyframes draw { to { stroke-dashoffset: 0; } }
            @keyframes popIn {
                from { opacity: 0; transform: scale(0); }
                to { opacity: 1; transform: scale(1); }
            }
            @keyframes fadeIn { to { opacity: 0.5; } }
            @keyframes float {
                0%, 100% { transform: translateY(0px); }
                50% { transform: translateY(-8px); }
            }
            @keyframes march { to { stroke-dashoffset: -8; } }
            @keyframes radar {
                0% { transform: scale(0.8); opacity: 0.6; }
                100% { transform: scale(2.5); opacity: 0; }
            }
            @keyframes packetFade {
                0% { opacity: 0; }
                20% { opacity: 1; }
                80% { opacity: 1; }
                100% { opacity: 0; }
            }
            @keyframes revealText { from { width: 0; } to { width: 400px; } }
            @keyframes glitch {
                0%, 100% { transform: translate(0, 0); }
                20% { transform: translate(-3px, 1px); }
                40% { transform: translate(3px, -2px); }
                60% { transform: translate(-2px, -1px); }
                80% { transform: translate(2px, 2px); }
            }

            @media (prefers-color-scheme: dark) {
                .name { fill: #f8fafc; }
                .subtitle { fill: #94a3b8; }
                .tech-text { fill: #64748b; }
                .link-line { stroke: #334155; }
            }
        </style>

        <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" style="stop-color:#38bdf8; stop-opacity:1" />
            <stop offset="100%" style="stop-color:#818cf8; stop-opacity:1" />
        </linearGradient>

        <clipPath id="type-clip">
            <rect x="-10" y="30" height="40" class="typewriter-rect" fill="white" />
        </clipPath>

        <path id="path1" d="M 580 110 L 670 60" />
        <path id="path2" d="M 580 110 L 640 160" />
        <path id="path3" d="M 670 60 L 640 160" />
        <path id="path4" d="M 640 160 L 730 130" />
        <path id="path5" d="M 670 60 L 730 130" />
    </defs>

    <g transform="translate(50, 85)">
        <text x="0" y="0" class="name name-glitch">Grant Hortelano</text>
        <line x1="0" y1="20" x2="120" y2="20" class="line" />
        
        <text x="0" y="55" class="subtitle" clip-path="url(#type-clip)">OFFENSIVE SECURITY • REVERSE ENGINEERING</text>

        <circle cx="5" cy="85" r="3" class="node d-1" />
        <text x="15" y="89" class="tech-text d-1">AppSec</text>
        
        <circle cx="85" cy="85" r="3" class="node d-2" />
        <text x="95" y="89" class="tech-text d-2">Exploitation</text>
        
        <circle cx="185" cy="85" r="3" class="node d-3" />
        <text x="195" y="89" class="tech-text d-3">Analysis</text>
    </g>
    <g class="floating">        
        <use href="#path1" class="link-line" />
        <use href="#path2" class="link-line" />
        <use href="#path3" class="link-line" />
        <use href="#path4" class="link-line" />
        <use href="#path5" class="link-line" />

        <circle r="2" class="packet" style="animation-delay: 1.5s;">
            <animateMotion dur="2.5s" repeatCount="indefinite" path="M 580 110 L 670 60" />
        </circle>
        <circle r="2" class="packet" style="animation-delay: 2.2s;">
            <animateMotion dur="3s" repeatCount="indefinite" path="M 580 110 L 640 160" />
        </circle>
        <circle r="2" class="packet" style="animation-delay: 1.8s;">
            <animateMotion dur="2s" repeatCount="indefinite" path="M 670 60 L 640 160" />
        </circle>
        <circle r="2" class="packet" style="animation-delay: 2.5s;">
            <animateMotion dur="3.5s" repeatCount="indefinite" path="M 640 160 L 730 130" />
        </circle>
        <circle r="2" class="packet" style="animation-delay: 1.2s;">
            <animateMotion dur="2.8s" repeatCount="indefinite" path="M 670 60 L 730 130" />
        </circle>

        <!-- Node 1: Python -->
        <g transform="translate(580, 110)">
            <circle cx="0" cy="0" r="14" class="pulse" style="animation-delay: 1.5s;" />
            <circle cx="0" cy="0" r="8" class="node" style="animation-delay: 1.4s;" />
            <text x="0" y="25" text-anchor="middle" class="tech-text" style="animation-delay: 1.5s;">Python</text>
        </g>

        <!-- Node 2: Go -->
        <g transform="translate(670, 60)">
            <circle cx="0" cy="0" r="12" class="pulse" style="animation-delay: 2.1s;" />
            <circle cx="0" cy="0" r="6" class="node" style="animation-delay: 1.6s;" />
            <text x="0" y="-15" text-anchor="middle" class="tech-text" style="animation-delay: 1.7s;">Go</text>
        </g>

        <!-- Node 3: Java -->
        <g transform="translate(730, 130)">
            <circle cx="0" cy="0" r="13" class="pulse" style="animation-delay: 1.8s;" />
            <circle cx="0" cy="0" r="7" class="node" style="animation-delay: 1.8s;" />
            <text x="0" y="25" text-anchor="middle" class="tech-text" style="animation-delay: 1.9s;">Java</text>
        </g>

        <!-- Sub-node (Decor) -->
        <g transform="translate(640, 160)">
            <circle cx="0" cy="0" r="4" class="node" style="animation-delay: 2.0s; fill: #94a3b8;" />
        </g>
    </g>
</svg>
